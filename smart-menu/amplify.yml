version: 1
applications:
  - appRoot: smart-menu
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - printf "BACKEND_URL=%s\n" "$BACKEND_URL" >> .env.production
            - printf "NEXT_PUBLIC_BACKEND_URL=%s\n" "$BACKEND_URL" >> .env.production
            - printf "CONTACT_EMAIL_FROM=%s\n" "$CONTACT_EMAIL_FROM" >> .env.production
            - printf "CONTACT_EMAIL_TO=%s\n" "$CONTACT_EMAIL_TO" >> .env.production
            - printf "SMTP_HOST=%s\n" "$SMTP_HOST" >> .env.production
            - printf "SMTP_PORT=%s\n" "$SMTP_PORT" >> .env.production
            - printf "SMTP_SECURE=%s\n" "$SMTP_SECURE" >> .env.production
            - printf "SMTP_USER=%s\n" "$SMTP_USER" >> .env.production
            - printf "SMTP_PASS=%s\n" "$SMTP_PASS" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*