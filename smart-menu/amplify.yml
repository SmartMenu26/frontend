version: 1
applications:
  - appRoot: smart-menu
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - printf "BACKEND_URL=%s\n" "$BACKEND_URL" >> .env.production
            - printf "NEXT_PUBLIC_BACKEND_URL=%s\n" "$BACKEND_URL" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*